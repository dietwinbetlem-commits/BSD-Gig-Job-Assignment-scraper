# ============================================================
# BSD Advies — Platform Configuratie
# Nieuwe bron toevoegen = één blok hieronder toevoegen
#
# Velden:
#   id:          unieke sleutel (geen spaties)
#   label:       weergavenaam in dashboard
#   category:    aggregator | zzp | bureau | overheid | linkedin
#   type:        public | authenticated
#   credentials: (optioneel) secret-namen uit GitHub Secrets
#   searches:    lijst van zoek-URLs of zoektermen
#   parser:      funle | itcontracts | freep | zzpopdrachten |
#                publiekepartner | hoofdkraan | freelancenl |
#                striive | circle8 | malt | flexspot | generic |
#                linkedin_jobs | linkedin_groups | linkedin_feed
#   active:      true | false
#   note:        (optioneel) toelichting
# ============================================================

platforms:

  # ── AGGREGATOREN (scrapt zelf al 100+ bronnen) ──────────────

  - id: funle_sdm
    label: "Funle — Service Delivery Manager"
    category: aggregator
    type: public
    parser: funle
    active: true
    searches:
      - url: "https://funle.nl/opdrachten?q=service+delivery+manager"
        term: "service delivery manager"
      - url: "https://funle.nl/opdrachten?q=procesmanager+ITIL"
        term: "procesmanager ITIL"
      - url: "https://funle.nl/opdrachten?q=servicemanager+ITIL"
        term: "servicemanager ITIL"
      - url: "https://funle.nl/opdrachten?q=ITSM+consultant"
        term: "ITSM consultant"
      - url: "https://funle.nl/opdrachten?q=SIAM"
        term: "SIAM"

  - id: striive
    label: "Striive (HeadFirst)"
    category: aggregator
    type: public
    parser: striive
    active: true
    note: "Grootste NL interim platform, 12.000+ opdrachten/jaar"
    searches:
      - url: "https://striive.com/nl/opdrachten?search=procesmanager+ITIL"
        term: "procesmanager ITIL"
      - url: "https://striive.com/nl/opdrachten?search=service+delivery+manager"
        term: "service delivery manager"
      - url: "https://striive.com/nl/opdrachten?search=servicemanager+ITIL"
        term: "servicemanager ITIL"
      - url: "https://striive.com/nl/opdrachten?search=ITSM+consultant"
        term: "ITSM consultant"
      - url: "https://striive.com/nl/opdrachten?search=SIAM"
        term: "SIAM"

  - id: planet_interim
    label: "Planet Interim"
    category: aggregator
    type: public
    parser: planet
    active: true
    note: "Direct-sourcing, 2500+ opdrachtgevers, 300+ bemiddelaars"
    searches:
      - url: "https://planetinterim.nl/interim-procesmanager/280009/p13/default.html"
        term: "procesmanager"
      - url: "https://planetinterim.nl/itil-service-manager-ai/474674/p13/default.html"
        term: "ITIL service manager"

  # ── IT-SPECIFIEKE PLATFORMS ──────────────────────────────────

  - id: itcontracts
    label: "IT-Contracts.nl"
    category: zzp
    type: public
    parser: itcontracts
    active: true
    searches:
      - url: "https://www.it-contracts.nl/freelance-ict-opdrachten-management-servicemanager"
        term: "servicemanager"
      - url: "https://www.it-contracts.nl/freelance-ict-opdrachten-management-procesmanager"
        term: "procesmanager"
      - url: "https://www.it-contracts.nl/nieuwste-freelance-ict-opdrachten/search/service+delivery+manager/from/"
        term: "service delivery manager"
      - url: "https://www.it-contracts.nl/nieuwste-freelance-ict-opdrachten/search/ITIL/from/"
        term: "ITIL"
      - url: "https://www.it-contracts.nl/nieuwste-freelance-ict-opdrachten/search/ITSM+consultant/from/"
        term: "ITSM consultant"
      - url: "https://www.it-contracts.nl/nieuwste-freelance-ict-opdrachten/search/SIAM/from/"
        term: "SIAM"

  - id: freep
    label: "Freep.nl"
    category: zzp
    type: public
    parser: freep
    active: true
    searches:
      - url: "https://www.freep.nl/zzp/procesmanager"
        term: "procesmanager"
      - url: "https://www.freep.nl/zzp/servicemanager"
        term: "servicemanager"

  - id: zzpopdrachten
    label: "ZZP-Opdrachten.nl"
    category: zzp
    type: public
    parser: zzpopdrachten
    active: true
    searches:
      - url: "https://www.zzp-opdrachten.nl/vacatures/?s=ITIL+procesmanager"
        term: "ITIL procesmanager"
      - url: "https://www.zzp-opdrachten.nl/vacatures/?s=service+delivery+manager"
        term: "service delivery manager"
      - url: "https://www.zzp-opdrachten.nl/vacatures/?s=ITSM+consultant"
        term: "ITSM consultant"
      - url: "https://www.zzp-opdrachten.nl/vacatures/?s=SIAM"
        term: "SIAM"

  # ── ZZP / INTERIM MARKTPLAATSEN ─────────────────────────────

  - id: hoofdkraan
    label: "Hoofdkraan.nl"
    category: zzp
    type: public
    parser: generic
    active: true
    searches:
      - url: "https://www.hoofdkraan.nl/opdrachten?q=procesmanager+ITIL"
        term: "procesmanager ITIL"
      - url: "https://www.hoofdkraan.nl/opdrachten?q=service+delivery+manager"
        term: "service delivery manager"

  - id: freelancenl
    label: "Freelance.nl"
    category: zzp
    type: public
    parser: freelancenl
    active: true
    note: "300.000+ freelancers, 50.000+ opdrachten/jaar"
    searches:
      - url: "https://www.freelance.nl/opdrachten/zoeken?q=procesmanager+ITIL"
        term: "procesmanager ITIL"
      - url: "https://www.freelance.nl/opdrachten/zoeken?q=service+delivery+manager"
        term: "service delivery manager"
      - url: "https://www.freelance.nl/opdrachten/zoeken?q=ITSM+consultant"
        term: "ITSM consultant"

  - id: flexspot
    label: "FlexSpot.io"
    category: zzp
    type: public
    parser: generic
    active: true
    searches:
      - url: "https://flexspot.io/functies/procesmanager/"
        term: "procesmanager"
      - url: "https://flexspot.io/zzp-opdrachten/?q=service+delivery+manager"
        term: "service delivery manager"

  - id: jobhob
    label: "Jobhob.nl"
    category: zzp
    type: public
    parser: generic
    active: true
    searches:
      - url: "https://jobhob.nl/zzp-opdrachten/?s=ITSM+procesmanager"
        term: "ITSM procesmanager"
      - url: "https://jobhob.nl/zzp-opdrachten/?s=service+delivery+manager"
        term: "service delivery manager"

  # ── OVERHEID ─────────────────────────────────────────────────

  - id: publiekepartner
    label: "De Publieke Partner"
    category: overheid
    type: public
    parser: publiekepartner
    active: true
    note: "Overheid & publieke sector specialist"
    searches:
      - url: "https://depubliekepartner.nl/rol/zzp-opdrachten-procesmanager/"
        term: "procesmanager"
      - url: "https://depubliekepartner.nl/?s=servicemanager+ITIL"
        term: "servicemanager ITIL"

  # ── BUREAUS ──────────────────────────────────────────────────

  - id: circle8
    label: "Circle8"
    category: bureau
    type: public
    parser: circle8
    active: true
    note: "Groot bij Rijkswaterstaat en gemeenten"
    searches:
      - url: "https://www.circle8.nl/opdrachten?q=procesmanager"
        term: "procesmanager"
      - url: "https://www.circle8.nl/opdrachten?q=servicemanager+ITIL"
        term: "servicemanager ITIL"

  - id: malt
    label: "Malt"
    category: bureau
    type: public
    parser: generic
    active: true
    searches:
      - url: "https://www.malt.nl/opdrachten?q=service+delivery+manager"
        term: "service delivery manager"
      - url: "https://www.malt.nl/opdrachten?q=IT+procesmanager"
        term: "IT procesmanager"

  # ── LINKEDIN (authenticatie vereist) ─────────────────────────

  - id: linkedin_jobs
    label: "LinkedIn — Vacatures"
    category: linkedin
    type: authenticated
    parser: linkedin_jobs
    active: true
    credentials:
      username_secret: LINKEDIN_EMAIL
      password_secret: LINKEDIN_PASSWORD
    searches:
      - term: "procesmanager ITIL"
        filters: "f_TPR=r86400&f_JT=C,T&location=Nederland"
      - term: "service delivery manager ITIL"
        filters: "f_TPR=r86400&f_JT=C,T&location=Nederland"
      - term: "ITSM consultant interim"
        filters: "f_TPR=r86400&f_JT=C,T&location=Nederland"
      - term: "SIAM consultant interim"
        filters: "f_TPR=r86400&f_JT=C,T&location=Nederland"

  - id: linkedin_feed
    label: "LinkedIn — Timeline & Groepen"
    category: linkedin
    type: authenticated
    parser: linkedin_feed
    active: true
    credentials:
      username_secret: LINKEDIN_EMAIL
      password_secret: LINKEDIN_PASSWORD
    note: "Scrapet persoonlijke timeline op opdracht-posts en groeps-updates"
    keywords:
      - "procesmanager"
      - "servicemanager"
      - "service delivery"
      - "ITSM"
      - "SIAM"
      - "interim"
      - "freelance"
      - "ZZP"
      - "opdracht"

