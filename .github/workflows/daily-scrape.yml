name: Dagelijkse Opdrachten Scraper

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    name: Scrape platforms & commit resultaten
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 instellen
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Dependencies installeren
        run: pip install -r scraper/requirements.txt

      - name: Playwright browser installeren
        run: python -m playwright install chromium --with-deps

      - name: Scraper uitvoeren
        run: python scraper/scrape.py
        env:
          PYTHONUNBUFFERED: '1'
          LINKEDIN_EMAIL:    ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}

      - name: Controleer of er iets veranderd is
        id: diff
        run: |
          git diff --quiet data/results.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push resultaten
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "BSD Scraper Bot"
          git config user.email "scraper@bsd-advies.nl"
          git add data/results.json
          DATUM=$(date +'%d-%m-%Y %H:%M UTC')
          git commit -m "🤖 Automatische scrape — ${DATUM}"
          git pull --rebase
          git push

      - name: Geen wijzigingen
        if: steps.diff.outputs.changed == 'false'
        run: echo "Geen nieuwe opdrachten — geen commit nodig."
